name: Flutter CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'   # 改用这个版本
          channel: 'stable'
      - run: flutter pub get
      - run: flutter test
      - run: flutter test integration_test -d chrome  # 集成测试使用 Chrome 浏览器运行
